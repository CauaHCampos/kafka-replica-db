version: '3.8'

services:
  # 1. Banco Principal de Escrita (SQL Server)
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql_primary
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Password!123"
      MSSQL_PID: "Developer"
      MSSQL_AGENT_ENABLED: "true" 

  # 2. Banco de Leitura/Destino (PostgreSQL)
  postgres:
    image: postgres:15-alpine
    container_name: postgres_replica
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: Password!123
      POSTGRES_DB: replica_db

  # 3. Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # 4. Apache Kafka
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # 5. Kafka Connect (Com Debezium Source e JDBC Sink)
  kafka-connect:
    image: confluentinc/cp-kafka-connect:7.5.0
    container_name: kafka_connect
    depends_on:
      - kafka
      - sqlserver
      - postgres
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:29092
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: "compose-connect-group"
      CONNECT_CONFIG_STORAGE_TOPIC: "replica_transacional_configs"
      CONNECT_OFFSET_STORAGE_TOPIC: "replica_transacional_offsets"
      CONNECT_STATUS_STORAGE_TOPIC: "replica_transacional_statuses"
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_KEY_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_VALUE_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_REST_ADVERTISED_HOST_NAME: "kafka_connect"
      CONNECT_PLUGIN_PATH: "/usr/share/java,/usr/share/confluent-hub-components"
    command:
      - bash
      - -c
      - |
        echo "Instalando JDBC Sink Connector (Confluent Hub)..."
        confluent-hub install --no-prompt confluentinc/kafka-connect-jdbc:latest
        
        echo "Baixando Debezium SQL Server direto da fonte oficial (Maven)..."
        mkdir -p /usr/share/confluent-hub-components/debezium-sqlserver
        curl -L https://repo1.maven.org/maven2/io/debezium/debezium-connector-sqlserver/2.5.0.Final/debezium-connector-sqlserver-2.5.0.Final-plugin.tar.gz | tar -xz -C /usr/share/confluent-hub-components/debezium-sqlserver --strip-components=1
        
        echo "Iniciando Kafka Connect..."
        /etc/confluent/docker/run